# arrtop configuration (YAML).
#
# Copy to one of the default-searched names in the working directory
# (config.yaml / config.yml / config.json), or point at it explicitly with
# `arrtop --config <path>` or the ARR_TOP_CONFIG environment variable.
#
# A JSON config with the same shape works too — see config.example.json.

# How often the live TUI redraws. Accepts <int>s, <int>ms, or a bare integer
# (seconds). Optional; defaults to 2s.
# refresh: 2s

# One entry per Sonarr/Radarr instance to poll.
backends:
  # A Sonarr instance.
  - name: sonarr            # human-readable label shown in the UI
    type: sonarr            # sonarr | radarr (lowercase)
    url: http://localhost:8989
    api_key: YOUR_SONARR_API_KEY

  # A Radarr instance.
  - name: radarr
    type: radarr
    url: http://localhost:7878
    api_key: YOUR_RADARR_API_KEY

# OPTIONAL download clients, queried for the EXACT per-episode size of a season
# pack (the *arr queue reports only the whole-pack total, so arrtop otherwise
# estimates each episode as pack_total / episode_count). Omit this whole block to
# keep that estimate — the feature is simply off. When present, a queue row is
# matched to a client by the row's download-client name, so `name` here must
# equal the download-client name Sonarr reports.
# download_clients:
#   - name: qbit                    # must match Sonarr's download-client name
#     type: qbittorrent             # qbittorrent (lowercase); only client for now
#     url: http://localhost:8080    # qBittorrent Web UI URL
#     username: admin
#     password: YOUR_QBITTORRENT_PASSWORD
